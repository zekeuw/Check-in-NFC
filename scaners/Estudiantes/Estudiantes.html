<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Asistencia - IES SJR</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .terminal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
            padding: 20px;
        }

        .terminal-card {
            max-width: 700px;
            width: 100%;
            text-align: center;
            padding: 40px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .btn-big {
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-big:active { transform: scale(0.95); }
        .btn-entrada { background-color: #10b981; }
        .btn-salida { background-color: #e11d48; }

        .btn-desc {
            font-size: 14px;
            font-weight: normal;
            opacity: 0.9;
        }

        .scan-area {
            text-align: left;
            margin-top: 10px;
            min-height: 130px;
            font-size: 16px;
            line-height: 1.6;
            border-radius: 8px;
            padding: 20px;
            background-color: #0f172a;
            color: #38bdf8;
            font-family: 'Consolas', monospace;
            border-left: 4px solid #38bdf8;
        }
    </style>
</head>
<body>

    <header class="top-bar" style="justify-content: center;">
        <h1 style="color: #1e40af; font-size: 20px;">Terminal de Acceso Estudiantes - IES San Juan de la Rambla</h1>
    </header>

    <div class="terminal-container">
        <div class="panel terminal-card">
            <h2 style="font-size: 28px; margin-bottom: 10px;">Control de Alumnado</h2>
            <p style="color: #64748b;">Elige la operación y pasa tu tarjeta por el lector.</p>

            <div class="btn-grid">
                <button class="btn-big btn-entrada" onclick="seleccionarOperacion('llegada_tarde')">
                    <span>ENTRADA</span>
                    <span class="btn-desc">(Llegada Tarde)</span>
                </button>

                <button class="btn-big btn-salida" onclick="seleccionarOperacion('salida_anticipada')">
                    <span>SALIDA</span>
                    <span class="btn-desc">(Salida Anticipada)</span>
                </button>
            </div>

            <div id="pantalla-status" class="scan-area">
                > Sistema listo para operar.<br>
                > Paso 1: Selecciona Entrada o Salida.<br>
                > Paso 2: Escanea tu tarjeta NFC.
            </div>
        </div>
    </div>

    <script src="estudiantes.js"></script>
</body>
</html>
